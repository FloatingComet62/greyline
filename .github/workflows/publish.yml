name: Publish to PyPI

# Publishes on every GitHub release. Uses PyPI Trusted Publishing (OIDC) —
# no API token stored anywhere. Configure the trusted publisher once at
# https://pypi.org/manage/project/greyline/settings/publishing/ with:
#   owner=cothinking-dev  repo=greyline  workflow=publish.yml  environment=pypi
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0   # no moving `v9` tag is published; pin exact
      # Guard: on a release, the tag (vX.Y.Z) must match pyproject's version, so a
      # mistagged release can't publish the wrong version. Fails before the build.
      - name: Check tag matches pyproject version
        if: github.event_name == 'release'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(grep -m1 '^version = ' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "release tag: $tag   pyproject version: $ver"
          [ "$tag" = "$ver" ] || { echo "::error::release tag ($tag) != pyproject version ($ver)"; exit 1; }
      - run: uv build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing; nothing else needed
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
