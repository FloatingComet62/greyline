<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>greyline — live demo</title>
<meta name="description" content="A live world-time desktop wallpaper — running in your browser.">
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden;
    font-family: system-ui, "Segoe UI", sans-serif; background: #0b0e14; color: #dfe3ea; }
  #wt { display: block; position: fixed; inset: 0; }
  #loading { position: fixed; inset: 0; display: grid; place-items: center;
    font-size: 15px; color: #8b93a5; letter-spacing: .02em; }
  .panel { position: fixed; z-index: 2; background: rgba(10,13,20,.72);
    border: 1px solid rgba(255,255,255,.10); border-radius: 12px;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  #top { top: 16px; left: 16px; padding: 10px 13px; max-width: min(78vw, 330px); }
  #top h1 { margin: 0 0 2px; font-size: 15px; font-weight: 650; letter-spacing: .01em; }
  #top p { margin: 0; font-size: 12px; line-height: 1.4; color: #aab2c4; }
  #top code { background: rgba(255,255,255,.08); padding: 1px 6px; border-radius: 5px;
    font-size: 12px; color: #e8ecf4; }
  #top a { color: #7fb0ff; text-decoration: none; }
  #top a:hover { text-decoration: underline; }
  #controls { bottom: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; padding: 8px; }
  .grp { display: flex; gap: 4px; padding: 0 6px; border-right: 1px solid rgba(255,255,255,.08); }
  .grp:last-child { border-right: 0; }
  button { font: inherit; font-size: 12.5px; color: #cfd5e2; cursor: pointer;
    background: transparent; border: 1px solid transparent; border-radius: 8px; padding: 5px 10px; }
  button:hover { background: rgba(255,255,255,.06); }
  button.on { background: rgba(127,176,255,.20); border-color: rgba(127,176,255,.45); color: #eaf1ff; }
  @media (max-width: 560px) { #top { max-width: 90vw; } .grp { border-right: 0; } }
</style>
</head>
<body>
<canvas id="wt"></canvas>
<div id="loading">loading the world…</div>

<div id="top" class="panel">
  <h1>greyline <span style="font-weight:400;color:#8b93a5">— live demo</span></h1>
  <p>A live world-time wallpaper, rendered in your browser — your timezone highlighted.
     Get it: <code>pipx install greyline</code> ·
     <a href="https://github.com/cothinking-dev/greyline">GitHub</a></p>
</div>

<div id="controls" class="panel">
  <div class="grp">
    <button data-set="theme:dark" data-group="theme" class="on">dark</button>
    <button data-set="theme:blue" data-group="theme">blue</button>
  </div>
  <div class="grp">
    <button data-set="fmt:24h" data-group="fmt" class="on">24h</button>
    <button data-set="fmt:12h" data-group="fmt">12h</button>
  </div>
  <div class="grp">
    <button data-set="bands:true" data-group="bands" class="on">twilight bands</button>
    <button data-set="bands:false" data-group="bands">terminator only</button>
  </div>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
