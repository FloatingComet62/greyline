# Default configuration for thinkpad_world_wallpaper_revived.
# User config at ~/.config/thinkpad-wallpaper/config.toml is merged over this
# (top-level keys override; a user [[city]] list replaces this one entirely).

backend = "auto"            # auto | sway | swww | hyprpaper | x11 (feh/xwallpaper)
map_style = "raster"        # raster (nostalgic ThinkPad art) | vector (scalable, themeable)
theme = "thinkpad-blue"     # thinkpad-blue | dark  (dark suits map_style=vector)
format = "24h"              # 24h | 12h
logo = true                 # ThinkPad wordmark, bottom-left (Lenovo trademark — see NOTICE)
bar_height = 0              # px reserved at the bottom for a status bar (lifts the logo)

[twilight]
bands = true               # discrete civil/nautical/astronomical bands
darkness = "subtle"        # subtle | medium | dramatic

[home]
tz = "auto"                # "auto" = system timezone, or e.g. "Asia/Kuala_Lumpur"
column_highlight = true

